# Luxe Interior — Netlify Configuration
# Rehan'Z Digital Network

[build]
  publish = "."
  command = ""

# Redirect rules for SPA (if expanding to multi-page)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for performance & security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Contact form (if using Netlify Forms)
# Uncomment and configure as needed:
# [build.environment]
#   FORM_NOTIFICATION_EMAIL = "hello@luxeinterior.in"
